#cloud-config
# Oracle Cloud Instance Setup — Lightweight Docker Compose Deployment
# For VM.Standard.E2.1.Micro (1 OCPU / 1GB RAM)
# Auto-deploys via git-pull cron (replaces K3s + ArgoCD)

chpasswd:
  list: |
    ubuntu:OracleCloud2024!
  expire: False

ssh_pwauth: True

packages:
  - python3
  - python3-pip
  - git
  - tmux
  - htop
  - curl
  - wget
  - iptables-persistent
  - netfilter-persistent
  - make
  - jq

runcmd:
  # Fix Oracle Cloud VCN Firewalls
  - iptables -I INPUT -p tcp --dport 22 -j ACCEPT
  - iptables -I INPUT -p tcp --dport 80 -j ACCEPT
  - iptables -I INPUT -p tcp --dport 443 -j ACCEPT
  - iptables -I INPUT -p tcp --dport 4000 -j ACCEPT
  - iptables -I INPUT -p tcp --dport 4002 -j ACCEPT
  - iptables -I INPUT -p tcp --dport 4003 -j ACCEPT
  - netfilter-persistent save
  - ufw disable

  # Install Tailscale for Secure Access
  - curl -fsSL https://tailscale.com/install.sh | sh
  - systemctl enable tailscaled
  - systemctl start tailscaled

  # Install Docker + Docker Compose
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker ubuntu

  # Create swap (helps on 1GB RAM)
  - fallocate -l 512M /swapfile
  - chmod 600 /swapfile
  - mkswap /swapfile
  - swapon /swapfile
  - echo '/swapfile none swap sw 0 0' >> /etc/fstab

  # Clone the Git Repository
  - cd /home/ubuntu
  - git clone https://github.com/thaisonnguyenbt2/stupid.git trading
  - chown -R ubuntu:ubuntu trading

  # Copy .env with production secrets (must be edited after first boot)
  - cp /home/ubuntu/trading/.env.example /home/ubuntu/trading/.env 2>/dev/null || true

  # Build and start all services
  - cd /home/ubuntu/trading
  - docker compose -f docker-compose.prod.yml up -d --build

  # Setup auto-deploy systemd timer (every 5 minutes)
  - chmod +x /home/ubuntu/trading/scripts/auto-deploy.sh
  - |
    cat > /etc/systemd/system/auto-deploy.service << 'EOF'
    [Unit]
    Description=XAU/USD Trading Platform Auto-Deploy
    After=docker.service

    [Service]
    Type=oneshot
    ExecStart=/home/ubuntu/trading/scripts/auto-deploy.sh
    User=ubuntu
    WorkingDirectory=/home/ubuntu/trading
    EOF
  - |
    cat > /etc/systemd/system/auto-deploy.timer << 'EOF'
    [Unit]
    Description=Auto-deploy every 5 minutes

    [Timer]
    OnBootSec=120
    OnUnitActiveSec=300
    Persistent=true

    [Install]
    WantedBy=timers.target
    EOF
  - systemctl daemon-reload
  - systemctl enable auto-deploy.timer
  - systemctl start auto-deploy.timer

final_message: |
  ==============================================================
  🚀 Oracle Cloud Trading Platform — Bootstrap Complete!
  ==============================================================

  Ubuntu User Password: OracleCloud2024!
  Architecture: Docker Compose (no K3s — lightweight for 1GB RAM)

  Next Steps:
  1. SSH into the box: ssh ubuntu@<public_ip>
  2. Edit .env with your API keys: nano /home/ubuntu/trading/.env
  3. Restart services: cd /home/ubuntu/trading && docker compose -f docker-compose.prod.yml restart
  4. Bring up Tailscale: sudo tailscale up

  Services:
    - Data Ingest:  http://<instance_ip>:4000
    - Analyzer API:  http://<instance_ip>:4002
    - Notifications: http://<instance_ip>:4003

  Auto-Deploy: Every 5 minutes via systemd timer
    - Logs: /var/log/auto-deploy.log
    - Status: systemctl status auto-deploy.timer
  ==============================================================
