apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: trading-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: trading-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: trading-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: trading-system
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30000
  selector:
    app: frontend
